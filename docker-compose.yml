# MediTrack — Walking Skeleton compose stack (Pattern P, Phase 1 success #4).
#
# `docker compose up --build` brings up:
#   postgres  : 16-alpine with named volume + pg_isready healthcheck
#   api       : Fastify + Prisma; on start runs `prisma migrate deploy`
#               + `prisma db seed` + `node dist/server.js` (all idempotent)
#   web       : Vite preview serving the built SPA; proxies /api → api:3000
#
# Network: default compose bridge — services resolve each other by name.
# Volumes: only pgdata is persistent; the api/web images are rebuilt from
# context on `--build` so source edits flow through cleanly.

services:
  postgres:
    image: postgres:16-alpine
    container_name: meditrack-postgres
    environment:
      POSTGRES_USER: meditrack
      POSTGRES_PASSWORD: meditrack
      POSTGRES_DB: meditrack
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meditrack -d meditrack"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: meditrack-api
    environment:
      # Runtime queries connect as the named non-owner role (Plan 05-07 / HIGH #3).
      # The REVOKE on AuditEvent UPDATE/DELETE/TRUNCATE binds this role; the app
      # cannot mutate audit rows even if a code path tries (D-98 Layer 2b).
      DATABASE_URL: postgres://meditrack_app:meditrack_app_dev@postgres:5432/meditrack
      # Migration runner + seed script use the owner role so they can create
      # roles, alter privileges, and bypass the REVOKE during data loads.
      # Both URLs point at the SAME database; only the connection role differs.
      # Prisma uses DIRECT_URL for prisma migrate deploy and prisma db seed;
      # runtime PrismaClient queries use DATABASE_URL.
      DIRECT_URL: postgres://meditrack:meditrack@postgres:5432/meditrack
      COOKIE_SECRET: ${COOKIE_SECRET:-dev-cookie-secret-please-replace-32b-min}
      PORT: "3000"
      NODE_ENV: production
      CI: "true"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/healthz').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 15s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: meditrack-web
    environment:
      VITE_API_HOST: api
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "5173:5173"

volumes:
  pgdata: {}
